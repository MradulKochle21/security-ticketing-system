<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Incident & Vulnerability Ticketing System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🛡️</div>
                <h1>SecureTrack</h1>
            </div>
            
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="dashboard">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-view="tickets">
                    <span class="icon">🎫</span>
                    <span>All Tickets</span>
                </button>
                <button class="nav-item" data-view="create">
                    <span class="icon">➕</span>
                    <span>New Ticket</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <p>Security First</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <h2 id="page-title">Security Dashboard</h2>
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" id="search-tickets" placeholder="Search tickets..." class="search-input">
                    </div>
                    <div class="filter-box">
                        <select id="filter-severity" class="filter-select">
                            <option value="">All Severities</option>
                            <option value="critical">🔴 Critical</option>
                            <option value="high">🟠 High</option>
                            <option value="medium">🟡 Medium</option>
                            <option value="low">🟢 Low</option>
                        </select>
                    </div>
                </div>
            </header>

            <!-- Dashboard View -->
            <section id="dashboard" class="view active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">🎫</div>
                        <div class="stat-content">
                            <div class="stat-value" id="stat-total">0</div>
                            <div class="stat-label">Total Tickets</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🔴</div>
                        <div class="stat-content">
                            <div class="stat-value" id="stat-open">0</div>
                            <div class="stat-label">Open Issues</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⚠️</div>
                        <div class="stat-content">
                            <div class="stat-value" id="stat-critical">0</div>
                            <div class="stat-label">Critical</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-content">
                            <div class="stat-value" id="stat-resolved">0</div>
                            <div class="stat-label">Resolved</div>
                        </div>
                    </div>
                </div>

                <div class="recent-activity">
                    <h3>Recent Tickets</h3>
                    <div id="recent-tickets" class="tickets-list"></div>
                </div>
            </section>

            <!-- All Tickets View -->
            <section id="tickets" class="view">
                <div class="tickets-container">
                    <div id="tickets-list" class="tickets-list"></div>
                    <div id="empty-state" class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>No tickets found</p>
                    </div>
                </div>
            </section>

            <!-- Create Ticket View -->
            <section id="create" class="view">
                <div class="create-ticket-panel">
                    <h3>Create New Security Ticket</h3>
                    <form id="ticket-form" class="ticket-form">
                        <div class="form-group">
                            <label for="title">Title *</label>
                            <input type="text" id="title" name="title" required placeholder="Brief description of the incident">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="incident_type">Incident Type *</label>
                                <select id="incident_type" name="incident_type" required>
                                    <option value="vulnerability">🔍 Vulnerability</option>
                                    <option value="breach">🔓 Security Breach</option>
                                    <option value="suspicious_activity">🚨 Suspicious Activity</option>
                                    <option value="misconfiguration">⚙️ Misconfiguration</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="severity">Severity *</label>
                                <select id="severity" name="severity" required>
                                    <option value="critical">🔴 Critical</option>
                                    <option value="high">🟠 High</option>
                                    <option value="medium" selected>🟡 Medium</option>
                                    <option value="low">🟢 Low</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="priority">Priority *</label>
                                <select id="priority" name="priority" required>
                                    <option value="critical">Critical</option>
                                    <option value="high">High</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="low">Low</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="assigned_to">Assign To</label>
                                <input type="text" id="assigned_to" name="assigned_to" placeholder="Team member name">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="description">Description *</label>
                            <textarea id="description" name="description" required placeholder="Detailed description of the security incident..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="impact">Business Impact</label>
                            <input type="text" id="impact" name="impact" placeholder="Describe the potential or actual impact...">
                        </div>

                        <button type="submit" class="submit-btn">Create Ticket</button>
                        <div id="form-status" class="form-status"></div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- Ticket Detail Modal -->
    <div id="ticket-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
